<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solicitação de Serviço</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .bg-brand { background-color: #FFC107; }
        .text-brand { color: #FFC107; }
        .focus\:border-brand:focus { border-color: #FFC107; }
        .focus\:ring-brand:focus { --tw-ring-color: #FFC107; }
        #toast { transition: all 0.3s ease; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col">

    <header class="bg-brand text-gray-900 shadow-md py-4 px-6 flex items-center justify-between z-10 shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">
                <i class="fas fa-tools text-brand text-xl"></i>
            </div>
            <div>
                <h1 class="font-black text-lg leading-tight uppercase tracking-wide">Manutenção</h1>
                <p class="text-xs font-medium opacity-80">Nova Solicitação</p>
            </div>
        </div>
    </header>

    <div class="flex-1 overflow-y-auto p-4 pb-20 relative">
        <div id="loading-overlay" class="absolute inset-0 bg-gray-100 bg-opacity-80 flex flex-col items-center justify-center z-20">
            <i class="fas fa-spinner fa-spin text-4xl text-brand mb-3"></i>
            <p class="text-gray-600 font-bold text-sm">Carregando formulário...</p>
        </div>

        <form id="form-new-os" onsubmit="handleNewOS(event)" class="space-y-4 max-w-lg mx-auto hidden fade-in">
            
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Seu Nome / Solicitante *</label>
                    <input type="text" id="os-requester" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-brand focus:ring-1 focus:ring-brand text-sm transition-all" placeholder="Como podemos te chamar?">
                </div>
                
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tipo da Ocorrência *</label>
                    <select id="os-occurrence-type" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-brand text-sm font-medium transition-all">
                        <option value="interna" selected>Manutenção Interna</option>
                        <option value="externa">Manutenção Externa</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Setor do Problema *</label>
                    <select id="os-sector" required class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-brand text-sm font-medium transition-all">
                        <option value="">Carregando setores...</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Equipamento (Opcional)</label>
                    <input type="text" id="os-equipment" list="machines-list" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-brand focus:ring-1 focus:ring-brand text-sm transition-all" placeholder="Qual máquina ou aparelho?">
                    <datalist id="machines-list"></datalist>
                </div>

                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Descrição Detalhada *</label>
                    <textarea id="os-description" required rows="3" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-brand text-sm transition-all" placeholder="O que está acontecendo? Descreva o problema..."></textarea>
                </div>
            </div>

            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-3">Evidência Fotográfica</label>
                <div class="grid grid-cols-2 gap-3 mb-3">
                    <label class="flex flex-col items-center justify-center p-4 border-2 border-dashed border-gray-200 rounded-xl hover:bg-gray-50 hover:border-brand cursor-pointer transition-all bg-white group">
                        <i class="fas fa-camera text-2xl text-gray-400 group-hover:text-brand transition-colors mb-2"></i>
                        <span class="text-xs font-bold text-gray-500 group-hover:text-gray-700">Tirar Foto</span>
                        <input type="file" accept="image/*" capture="environment" class="sr-only" onchange="previewPhoto(event)">
                    </label>
                    <label class="flex flex-col items-center justify-center p-4 border-2 border-dashed border-gray-200 rounded-xl hover:bg-gray-50 hover:border-brand cursor-pointer transition-all bg-white group">
                        <i class="fas fa-images text-2xl text-gray-400 group-hover:text-brand transition-colors mb-2"></i>
                        <span class="text-xs font-bold text-gray-500 group-hover:text-gray-700">Galeria</span>
                        <input type="file" accept="image/*" multiple class="sr-only" onchange="previewPhoto(event)">
                    </label>
                </div>
                <div id="new-os-photos-grid" class="grid grid-cols-3 gap-2"></div>
            </div>

            <button type="submit" id="btn-submit" class="w-full bg-brand text-gray-900 font-bold p-4 rounded-xl shadow-lg hover:bg-yellow-500 hover:-translate-y-0.5 transition-all active:scale-95 flex items-center justify-center gap-2 text-lg">
                <i class="fas fa-paper-plane"></i> Enviar Solicitação
            </button>
        </form>

        <div id="success-screen" class="hidden flex-col items-center justify-center h-full text-center space-y-4 py-10 fade-in">
            <div class="w-20 h-20 bg-green-100 text-green-500 rounded-full flex items-center justify-center shadow-inner">
                <i class="fas fa-check text-4xl"></i>
            </div>
            <h2 class="text-2xl font-black text-gray-800">Enviado com Sucesso!</h2>
            <p class="text-gray-500 max-w-xs text-sm mx-auto">Sua solicitação de manutenção foi registrada e enviada para a equipe.</p>
            <p class="text-gray-600 font-bold text-lg mt-2 bg-gray-100 py-2 px-6 rounded-lg inline-block" id="success-os-id"></p>
            <button onclick="location.reload()" class="mt-8 px-6 py-3 bg-gray-200 text-gray-700 font-bold rounded-xl hover:bg-gray-300 transition-colors shadow-sm">Nova Solicitação</button>
        </div>
    </div>

    <div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-5 py-3 rounded-full shadow-2xl opacity-0 pointer-events-none text-sm font-medium whitespace-nowrap z-50 flex items-center gap-2">
        <i class="fas fa-info-circle text-brand"></i>
        <span id="toast-msg"></span>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, getDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBg0q1TSpA6U3G718A94Z28EF7m3pwlcs0",
            authDomain: "manutencao-a4ac3.firebaseapp.com",
            projectId: "manutencao-a4ac3",
            storageBucket: "manutencao-a4ac3.firebasestorage.app",
            messagingSenderId: "760970980011",
            appId: "1:760970980011:web:1c756b199ef264575be5ee",
            measurementId: "G-27K5CNXYCE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let appState = {
            photos: [],
            machines: [],
            leaders: []
        };

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            toast.classList.remove('opacity-0');
            toast.classList.add('opacity-100', '-translate-y-0');
            setTimeout(() => {
                toast.classList.remove('opacity-100', '-translate-y-0');
                toast.classList.add('opacity-0');
            }, 3000);
        }

        onAuthStateChanged(auth, user => {
            if (!user) {
                signInAnonymously(auth).catch(err => {
                    console.warn("Erro no login anonimo", err);
                    showToast("Erro de conexao. Tente novamente.");
                });
            } else {
                loadInitialData();
            }
        });

        async function loadInitialData() {
            try {
                // Carregar Setores
                try {
                    const settingsSnap = await getDoc(doc(db, "settings", "general"));
                    const sectorSelect = document.getElementById('os-sector');
                    if (settingsSnap.exists() && settingsSnap.data().sectors) {
                        sectorSelect.innerHTML = '<option value="">Selecione...</option>';
                        settingsSnap.data().sectors.forEach(s => {
                            sectorSelect.innerHTML += `<option value="${s.name}">${s.name}</option>`;
                        });
                        
                        const urlParams = new URLSearchParams(window.location.search);
                        const setorParam = urlParams.get('setor');
                        if (setorParam) {
                            sectorSelect.value = setorParam;
                        }
                    } else {
                        sectorSelect.innerHTML = '<option value="">Nenhum setor encontrado</option>';
                    }
                } catch(e) { console.warn("Erro ao carregar setores:", e); }

                // Carregar Maquinas
                try {
                    const machinesSnap = await getDocs(collection(db, "machines"));
                    const datalist = document.getElementById('machines-list');
                    datalist.innerHTML = '';
                    machinesSnap.forEach(d => {
                        const m = d.data();
                        appState.machines.push({ dbId: d.id, ...m });
                        datalist.innerHTML += `<option value="${m.name}"></option>`;
                    });
                } catch(e) { console.warn("Erro ao carregar maquinas:", e); }

                // Carregar Lideres
                try {
                    const usersSnap = await getDocs(collection(db, "users"));
                    usersSnap.forEach(d => {
                        const u = d.data();
                        if (u.role === 'operacional_leader' || u.role === 'galp_leader') {
                            appState.leaders.push(u);
                        }
                    });
                } catch(e) { console.warn("Erro ao carregar lideres:", e); }

            } catch (error) {
                console.error("Erro geral ao carregar dados:", error);
            } finally {
                // Remover loading e mostrar formulario
                const overlay = document.getElementById('loading-overlay');
                const form = document.getElementById('form-new-os');
                if (overlay) overlay.classList.add('hidden');
                if (form) form.classList.remove('hidden');
            }
        }

        window.previewPhoto = function(event) {
            const files = event.target.files;
            if(!files || files.length === 0) return;
            
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = e => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800;
                        let scaleSize = MAX_WIDTH / img.width;
                        if(scaleSize > 1) scaleSize = 1; 
                        
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        const compressedBase64 = canvas.toDataURL('image/jpeg', 0.6); 
                        appState.photos.push(compressedBase64);
                        renderPhotos();
                    }
                    img.src = e.target.result;
                }
                reader.readAsDataURL(file);
            });
            event.target.value = ''; 
        };

        function renderPhotos() {
            const grid = document.getElementById('new-os-photos-grid');
            grid.innerHTML = '';
            appState.photos.forEach((src, idx) => {
                grid.innerHTML += `
                    <div class="relative group aspect-square rounded-xl overflow-hidden shadow-sm border border-gray-200">
                        <img src="${src}" class="w-full h-full object-cover">
                        <button type="button" onclick="removePhoto(${idx})" class="absolute inset-0 bg-black bg-opacity-40 flex items-center justify-center transition-opacity">
                            <div class="w-8 h-8 bg-red-500 rounded-full flex items-center justify-center text-white shadow"><i class="fas fa-trash-alt text-xs"></i></div>
                        </button>
                    </div>
                `;
            });
        }

        window.removePhoto = function(idx) {
            appState.photos.splice(idx, 1);
            renderPhotos();
        };

        window.handleNewOS = async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('btn-submit');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registrando...';

            try {
                // Obter proximo ID via query rapida
                const year = new Date().getFullYear();
                const q = query(collection(db, "orders"), orderBy("id", "desc"), limit(1));
                const maxSnap = await getDocs(q);
                
                let maxNum = 0;
                if (!maxSnap.empty) {
                    const lastId = maxSnap.docs[0].data().id;
                    if (lastId && lastId.startsWith(`OS-${year}`)) {
                        maxNum = parseInt(lastId.substring(7), 10) || 0;
                    }
                }
                const num = maxNum + 1;
                const newId = `OS-${year}${String(num).padStart(4, '0')}`;

                const requester = document.getElementById('os-requester').value.trim();
                const sector = document.getElementById('os-sector').value;
                const equipment = document.getElementById('os-equipment').value.trim();
                const description = document.getElementById('os-description').value.trim();
                const occurrenceType = document.getElementById('os-occurrence-type').value;

                const linkedMachine = equipment ? (appState.machines.find(m => m.name.toLowerCase() === equipment.toLowerCase()) || null) : null;
                const linkedMachineId = linkedMachine ? linkedMachine.dbId : null;

                let assignedToVal = "";
                if (occurrenceType === 'interna') {
                    const leaders = appState.leaders.filter(l => l.role === 'operacional_leader');
                    if (leaders.length > 0) assignedToVal = leaders.map(l => l.name).join(", ");
                    else assignedToVal = "Líder Operacional";
                } else if (occurrenceType === 'externa') {
                    const leaders = appState.leaders.filter(l => l.role === 'galp_leader');
                    if (leaders.length > 0) assignedToVal = leaders.map(l => l.name).join(", ");
                    else assignedToVal = "Líder de Galpão";
                }

                const newOsData = {
                    id: newId,
                    requester: requester,
                    sector: sector,
                    equipment: equipment,
                    description: description,
                    type: occurrenceType,
                    status: 'Solicitada',
                    createdAt: new Date().toISOString(),
                    photos: appState.photos,
                    assignedTo: assignedToVal,
                    gut: { g: 1, u: 1, t: 1, score: 1 },
                    deadline: "",
                    itemsUsed: [],
                    history: [{
                        date: new Date().toISOString(),
                        author: requester || "Sistema",
                        description: "OS Registrada via App QR Code com status 'Solicitada' - Tipo: " + (occurrenceType === 'externa' ? 'Externa' : 'Interna')
                    }],
                    linkedMachineId: linkedMachineId
                };

                // Salva no Firestore
                await addDoc(collection(db, "orders"), newOsData);

                // Integracao Google Sheets
                try {
                    const webhookUrl = "https://script.google.com/macros/s/AKfycbyUpz5XCf4EsWJ8IuvKKbNAdX5B5W0laNczhUvPzRXDf-lBapqR_EG8a7naTOsvxQ9Thg/exec";
                    fetch(webhookUrl, {
                        method: "POST",
                        mode: "no-cors",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            id: newOsData.id,
                            createdAt: new Date(newOsData.createdAt).toLocaleString('pt-BR'),
                            requester: newOsData.requester,
                            sector: newOsData.sector,
                            equipment: newOsData.equipment,
                            description: newOsData.description,
                            status: newOsData.status,
                            gutScore: newOsData.gut.score,
                            assignedTo: newOsData.assignedTo,
                            deadline: ""
                        })
                    }).catch(err => console.warn(err));
                } catch(e) {}

                document.getElementById('form-new-os').classList.add('hidden');
                document.getElementById('success-screen').classList.remove('hidden');
                document.getElementById('success-screen').classList.add('flex');
                document.getElementById('success-os-id').innerText = newId;

            } catch (error) {
                console.error("Erro:", error);
                showToast("Erro ao registrar OS. Tente novamente.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar Solicitação';
            }
        };
    </script>
</body>
</html>
